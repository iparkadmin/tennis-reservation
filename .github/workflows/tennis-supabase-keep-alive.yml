# Supabase Keep Alive for tennis-reservation (standalone repo)
# Prevents free tier project from being paused after 7 days of inactivity
# See: docs/deployment/15_supabase_keep_alive_setup.md
name: Tennis Reservation - Supabase Keep Alive
on:
  schedule:
    - cron: '0 9 * * 0,3'
  workflow_dispatch:
jobs:
  keep-alive-copy:
    name: Keep alive (Copy)
    runs-on: ubuntu-latest
    steps:
      - name: Debug Copy secrets (temporary)
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "URL length: ${#URL}"
          echo "URL tail: $(echo -n "$URL" | tail -c5)"
          echo "KEY length: ${#KEY}"
          echo "KEY prefix: ${KEY:0:7}"
      - name: Ping Supabase (Copy)
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_URL and SUPABASE_ANON_KEY secrets are required for Copy env."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/_keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id":1,"last_run":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "Keep-alive succeeded (Copy)"
  keep-alive-origin:
    name: Keep alive (Origin)
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (Origin)
        run: |
          if [ -z "${{ secrets.TENNIS_ORIGIN_SUPABASE_URL }}" ] || [ -z "${{ secrets.TENNIS_ORIGIN_SUPABASE_ANON_KEY }}" ]; then
            echo "Skipping: TENNIS_ORIGIN_SUPABASE_URL and TENNIS_ORIGIN_SUPABASE_ANON_KEY are required for Origin env."
            exit 0
          fi
          curl -fsS -X GET "${{ secrets.TENNIS_ORIGIN_SUPABASE_URL }}/rest/v1/reservations?select=id&limit=1" \
            -H "apikey: ${{ secrets.TENNIS_ORIGIN_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TENNIS_ORIGIN_SUPABASE_ANON_KEY }}" \
            -H "Accept: application/json" \
            -H "Prefer: count=exact"
          echo "Keep-alive succeeded (Origin)"
